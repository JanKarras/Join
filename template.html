<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./assets/style/template.css" />
  <link rel="stylesheet" href="./assets/style/fonts.css" />
  <link rel="stylesheet" href="./assets/style/font.css">
  <script src="./assets/js/template_js.js"></script>
  <script src="./assets/js/summary_js.js"></script>
  <script src="./assets/js/add_task_js.js"></script>
  <script src="./assets/js/board_js.js"></script>
  <script src="./assets/js/header_js.js"></script>
  <script src="./assets/js/contacts_js.js"></script>
  <script src="./assets/js/legal_notice._js.js"></script>
  <script src="./assets/js/help_js.js"></script>
  <script src="./assets/js/privacy_policy_js.js"></script>
  <script src="./assets/js/remote_storage"></script>
  <title>Join</title>
</head>

<body class="font" id="body" onload="template_init()">
  <div>
    <div id="side_bar" class="side_bar">
      <div class="width_100 center_felx">
        <img src="./assets/img/logo-white.png" class="siede_bar_logo_header" alt="join_logo" />
      </div>
      <nav class="nav">
        <div class="menu">
          <div onclick="menue_clicked('summary')" id="summary" class="btn_clicked menu_buttons">
            <img src="./assets/img/summary_icon.png" class="side_bar_logos_img" />
            <div class="menu_name">Summary</div>
          </div>
          <div onclick="menue_clicked('add_task')" id="add_task" class="menu_buttons">
            <img src="./assets/img/add_task_icon.png" class="side_bar_logos_img" />
            <div class="menu_name">Add Task</div>
          </div>
          <div onclick="menue_clicked('board')" id="board" class="menu_buttons">
            <img src="./assets/img/board_icon.png" class="side_bar_logos_img" />
            <div class="menu_name">Board</div>
          </div>
          <div onclick="menue_clicked('contacts')" id="contacts" class="menu_buttons">
            <img src="./assets/img/contacts_icon.png" class="side_bar_logos_img" />
            <div class="menu_name">Contacts</div>
          </div>
        </div>
        <div class="legal">
          <div id="privacy_policy" onclick="menue_clicked('privacy_policy')" class="nav_legal"><div class="nav_legal_p">Privacy Policy</div></div>
          <div id="legal_notice" onclick="menue_clicked('legal_notice')" class="nav_legal"><div class="nav_legal_p">Legal notice</div></div>
        </div>
      </nav>
    </div>
  </div>
  <div class="header_content_container">
    <div class="header" w3-include-html="./header.html"></div>
    <div class="content" id="content" w3-include-html=""></div>
</body>

</html>
