<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- <link rel="stylesheet" href="./assets/style/fonts.css" />
    <link rel="stylesheet" href="./assets/style/font.css" /> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/style/add_task_style.css" />

    <script src="./assets/js/header_js.js"></script>
    <script src="./assets/js/template_js.js"></script>
    <script src="./assets/js/data.js"></script>
    <script src="./assets/js/contacts_js.js"></script>
    <script src="./assets/js/add_task_js.js"></script>
    <title>Document</title>
  </head>

  <body class="font">
    <div id="add_task_body" class="add_task_body">
      <div id="content">
        <div class="add_task_h1">Add Task</div>
        <div class="add_task_content">
          <div class="left_side">
            <div class="title2">
              <div class="display_flex">
                <label class="name_of_input">Title</label>
                <div class="star">*</div>
              </div>
              <input
                id="title_input"
                type="text"
                placeholder="Enter a title"
                required
              />
            </div>
            <div class="description2">
              <div class="task-description">
                <label class="description">Description</label>
                <textarea
                  class="description_input"
                  placeholder="Enter a description"
                  required
                  id="description_input"
                ></textarea>
              </div>
            </div>
            <div class="assign-to">
              <label>Assigned to</label>
              <div class="contacts">
                <div class="contact-select date_picker" id="contactSelect">
                  <input
                    class="select-box"
                    onclick="toggleOptions()"
                    placeholder="Select contacts to assign"
                  />
                  <span><i class="fa-solid fa-angle-down icon"></i></span>
                </div>
                <div class="options-container" id="optionsContainer"></div>
                <div class="selected_cont_initials"></div>
              </div>
            </div>
            <div class="prios2">
              <label>Prio</label>
              <div class="prio">
                <div class="prio_btns urgent" onclick="setPriority('urgent')">
                  <label>Urgent</label>
                  <span><i class="fa-solid fa-angles-up"></i></span>
                </div>
                <div class="prio_btns medium" onclick="setPriority('medium')">
                  <label>Medium</label>
                  <span><i class="fa-solid fa-equals"></i></span>
                </div>
                <div class="prio_btns low" onclick="setPriority('low')">
                  <label>Low</label>
                  <span><i class="fa-solid fa-angles-down"></i></span>
                </div>
              </div>
            </div>
          </div>

          <!-- ############# -->
          <div class="seperator_add_task"></div>

          <div class="add_task_sides right_side">
            <div class="date">
              <div class="display_flex">
                <label class="name_of_input">Due date</label>
                <div class="star">*</div>
              </div>
              <div class="date_picker">
                <input required type="date" id="date_input" />
              </div>
            </div>
            <div class="date2">
              <div class="display_flex">
                <label class="name_of_input">Due date</label>
                <div class="star">*</div>
              </div>
              <div class="date_picker">
                <input required type="date" id="date_input" />
              </div>
            </div>
            <div class="prios">
              <label>Prio</label>
              <div class="prio">
                <div class="prio_btns urgent" onclick="setPriority('urgent')">
                  <label>Urgent</label>
                  <span><i class="fa-solid fa-angles-up"></i></span>
                </div>
                <div class="prio_btns medium" onclick="setPriority('medium')">
                  <label>Medium</label>
                  <span><i class="fa-solid fa-equals"></i></span>
                </div>
                <div class="prio_btns low" onclick="setPriority('low')">
                  <label>Low</label>
                  <span><i class="fa-solid fa-angles-down"></i></span>
                </div>
              </div>
            </div>
            <div>
              <div class="display_flex">
                <label class="name_of_input">Category</label>
                <div class="star">*</div>
              </div>
              <div class="contact-select" id="customSelect">
                <div class="select-head date_picker" onclick="toggleCategory()">
                  <div id="selectedCat">Select task category</div>

                  <span><i class="fa-solid fa-angle-down icon"></i></span>
                </div>
                <div class="category-container" id="categoryContainer">
                  <div
                    class="option"
                    onclick="selectCategory('Techniker task')"
                  >
                    Techniker Task
                  </div>
                  <div class="option" onclick="selectCategory('User Story')">
                    User Story
                  </div>
                </div>
              </div>
            </div>

            <!-- ### -->
            <div class="subtasks_list">
              <label>Subtasks</label>
              <div class="date_picker" onclick="enterSubtasks()">
                <input
                  id="enter-subtask"
                  type="text"
                  placeholder="Add new subtask"
                />
                <span id="add-subtask" class="subtask">
                  <i id="openAddTask" class="fa-solid fa-plus"></i>
                </span>
                <span id="add-cancel-subtask" class="add_cancel">
                  <i
                    onclick="clearInputField()"
                    id="delete-subtask"
                    class="fa-solid fa-xmark"
                  ></i>
                  <i
                    id="confirm-subtask"
                    class="fa-solid fa-check"
                    onclick="addSubtask()"
                  ></i>
                </span>
              </div>
              <ul id="subtaskList" class="subtask-list added_subtasks"></ul>
            </div>
          </div>
          <!--##################-->
        </div>
        <footer>
          <div class="required">
            <div class="star">*</div>
            <div class="required-s">This field is required</div>
          </div>
          <div class="footer_btns_container">
            <div class="clear" onclick="clearFields()">
              <div>Clear</div>
              <span><i class="fa-solid fa-xmark"></i></span>
            </div>
            <div class="create" onclick="insertTask()">
              <div>Create Task</div>
              <span><i class="fa-solid fa-check"></i></span>
            </div>
          </div>
        </footer>
      </div>
    </div>
  </body>
</html>
