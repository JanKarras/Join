<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/style/add_task_style.css" />
    <!-- <link rel="stylesheet" href="./assets/style/fonts.css">
    <link rel="stylesheet" href="./assets/style/font.css"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <script src="./assets/js/add_task_js.js"></script>
    <script src="./assets/js/header_js.js"></script>
    <script src="./assets/js/template_js.js"></script>
    <script src="assets/js/data.js"></script>
    <title>Document</title>
  </head>

  <body class="font">
    <div id="add_task_body" class="add_task_body">
      <div id="content">
        <div class="add_task_h1">Add Task</div>
        <div class="add_task_content">
          <div class="add_taks_sides left_side">
            <div>
              <div class="display_flex">
                <label class="name_of_input">Title</label>
                <div class="star">*</div>
              </div>
              <input type="text" placeholder="Enter a title" required />
            </div>
            <div>
              <div>
                <label class="description">Description</label>
                <textarea
                  class="description_input"
                  placeholder="Enter a description"
                  required
                  cols="5"
                ></textarea>
              </div>
            </div>
            <div>
              <label>Assigned to</label>
              <div class="contact-select" id="contactSelect">
                <div class="select-box" onclick="toggleOptions()">
                  <span id="selectedOption">Select a user</span>
                  <span><i class="fa-solid fa-angle-down"></i></span>
                </div>
                <div class="options-container" id="optionsContainer"></div>
              </div>
            </div>
          </div>

          <!-- ############# -->
          <div class="seperator_add_task"></div>

          <div class="add_taks_sides right_side">
            <div>
              <div class="display_flex">
                <label class="name_of_input">Due date</label>
                <div class="star">*</div>
              </div>
              <div class="date_picker">
                <input
                  required
                  type="date"
                  id="date_input"
                  placeholder="tt/mm/jjjj"
                />
              </div>
            </div>
            <div>
              <label>Prio</label>
              <div class="prio">
                <div class="prio_btns urgent">
                  <label>Urgent</label>
                  <span><i class="fa-solid fa-angles-up"></i></span>
                </div>
                <div class="prio_btns medium">
                  <label>Medium</label>
                  <span><i class="fa-solid fa-equals"></i></span>
                </div>
                <div class="prio_btns low">
                  <label>Low</label>
                  <span><i class="fa-solid fa-angles-down"></i></span>
                </div>
              </div>
            </div>
            <div>
              <div>
                <div class="display_flex">
                  <label class="name_of_input">Category</label>
                  <div class="star">*</div>
                </div>

                <div class="contact-select" id="contactSelect">
                  <div class="select-box" onclick="toggleCategory()">
                    <span id="selectedCategory">Select task category</span>
                    <span><i class="fa-solid fa-angle-down"></i></span>
                  </div>
                  <div class="options-container" id="categoryContainer"></div>
                </div>
              </div>
            </div>
            <div>
              <label>Subtasks</label>
              <div class="date_picker">
                <input type="text" placeholder="Add new subtask" />
                <span><i class="fa-solid fa-plus"></i></span>
              </div>
            </div>
          </div>
          <!-- ################# -->
        </div>
        <footer>
          <div class="required">
            <div class="star">*</div>
            <div>This field is required</div>
          </div>
          <div class="footer_btns_container">
            <div class="clear">
              <div>Clear</div>
              <span><i class="fa-solid fa-xmark"></i></span>
            </div>
            <div class="create">
              <div>Create Task</div>
              <span><i class="fa-solid fa-check"></i></span>
            </div>
          </div>
        </footer>
      </div>
    </div>
  </body>
</html>
