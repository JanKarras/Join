<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts</title>
    <link rel="stylesheet" href="assets/style/contacts_style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section class="contacts" onload="contacts_init()">
      <div class="contact_sidebar">
        <div class="add_contact">
          <div class="add_new_contact">
            <span>Add new contact</span>
            <span><i class="fa-solid fa-user-plus"></i></span>
          </div>
        </div>
        <div class="contact_list">
          <!-- first contact -->
          <div class="contact_info" id="name_email"></div>
          <!-- end of first contact -->
        </div>
      </div>
      <div class="contact_detail" id="contact_details"></div>
    </section>

    <script src="assets/js/contacts_js.js"></script>
  </body>
</html>
